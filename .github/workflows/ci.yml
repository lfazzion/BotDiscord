# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          RAILS_ENV=test
          CHROME_HOST=chrome
          CHROME_PORT=9222
          SECRET_KEY_BASE=ci_secret_key_base_placeholder
          GOOGLE_AI_API_KEY=ci_test_key
          OPENROUTER_API_KEY=ci_test_key
          DISCORD_BOT_TOKEN=ci_test_token
          DISCORD_DIGEST_CHANNEL_ID=
          EOF

      - name: Build images
        run: docker compose -f docker/docker-compose.yml build test chrome

      - name: Start Chrome
        run: |
          docker compose -f docker/docker-compose.yml up -d chrome
          sleep 3

      - name: Run tests
        run: docker compose -f docker/docker-compose.yml run --rm test

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
