# .github/workflows/post-merge-recovery.yml
name: Post-Merge Recovery

# Triggers after the existing CI workflow completes on main.
# This is the correct pattern to react to CI failures post-merge
# without interfering with PR-level CI runs.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Prevent concurrent recovery attempts — never cancel an in-progress recovery.
concurrency:
  group: post-merge-recovery-main
  cancel-in-progress: false

# Minimum permissions required:
#   contents: write   — create branches
#   pull-requests: write — create PRs, post comments
#   actions: read — read failed job/step details
permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run when:
    # 1. CI concluded with failure
    # 2. The triggering event was a push (not a PR run)
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push'
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GITHUB_TOKEN is sufficient for all operations here.
          # No PAT or additional secrets needed.

      - name: Run failure recovery
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_RUN_URL: ${{ github.event.workflow_run.html_url }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: bash .github/scripts/recover-failure.sh
