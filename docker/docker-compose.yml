version: '3.8'

# Rede interna fechada — nenhum serviço expõe porta desnecessária
networks:
  internal:
    driver: bridge

services:
  # ── Serviço principal: API Puma ────────────────────────────────────────────
  app:
    build:
      context: ..                    # raiz do projeto
      dockerfile: docker/Dockerfile  # relativo ao context
    env_file:
      - ../.env                      # variáveis de ambiente (não commitar)
    environment:
      RAILS_ENV: production
      CHROME_HOST: chrome
      CHROME_PORT: "9222"
      RAILS_LOG_TO_STDOUT: "true"
    volumes:
      # Bind mount relativo ao docker-compose.yml → ../storage = raiz do projeto
      - ../storage:/rails/storage
    ports:
      - "3000:3000"
    depends_on:
      chrome:
        condition: service_started
    networks:
      - internal
    command: bin/rails server -b 0.0.0.0
    restart: unless-stopped

  # ── Serviço de Jobs: Solid Queue ──────────────────────────────────────────
  jobs:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env                      # variáveis de ambiente (não commitar)
    environment:
      RAILS_ENV: production
      CHROME_HOST: chrome
      CHROME_PORT: "9222"
      RAILS_LOG_TO_STDOUT: "true"
    volumes:
      - ../storage:/rails/storage
    depends_on:
      chrome:
        condition: service_started
    networks:
      - internal
    command: bundle exec rake solid_queue:start
    restart: unless-stopped

  # ── Chrome Headless Shell ─────────────────────────────────────────────────
  chrome:
    image: chromedp/headless-shell:stable
    # shm_size obrigatório: evita memory leak de renderização no Ferrum/Chrome 120+
    shm_size: '2gb'
    security_opt:
      - seccomp:unconfined
    ports:
      - "9222:9222"
    networks:
      - internal
    restart: unless-stopped
