#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  discovery_job:
    class: DiscoveryJob
    queue: default
    schedule: at 3am every tuesday and friday
  collect_tmdb_catalog_job:
    class: CollectTmdbCatalogJob
    queue: default
    schedule: at 4am every monday
  collect_igdb_catalog_job:
    class: CollectIgdbCatalogJob
    queue: default
    schedule: at 4am every tuesday
  collect_rawg_catalog_job:
    class: CollectRawgCatalogJob
    queue: default
    schedule: at 5am every tuesday
  collect_anilist_catalog_job:
    class: CollectAnilistCatalogJob
    queue: default
    schedule: at 4am every wednesday
  collect_events_rss_job:
    class: CollectEventsRssJob
    queue: default
    schedule: every day at 7am
  weekly_digest_job:
    class: WeeklyDigestJob
    queue: default
    schedule: at 9am every monday
  friday_ideation_job:
    class: FridayIdeationJob
    queue: default
    schedule: at 2pm every friday
  sqlite_backup_job:
    class: SqliteBackupJob
    queue: critical
    schedule: at 3am every day
