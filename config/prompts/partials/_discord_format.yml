content: |
  FORMATAÇÃO PARA DISCORD:
  * Máximo de 1900 caracteres por resposta (limite do Discord: 2000).
  * Use listas com `-` para múltiplos itens.
  * Para tabelas comparativas, use formato de lista com separadores.
  * Destaque números importantes com **negrito**.
  * Quando dados são insuficientes, diga "dados insuficientes" — não invente.
