default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: db/development.sqlite3

test:
  <<: *default
  database: db/test.sqlite3
  migrations_paths:
    - db/migrate
    - db/queue_migrate
    - db/cache_migrate

production:
  primary:
    <<: *default
    database: storage/production.sqlite3
    pool: <%= ENV.fetch("PRIMARY_POOL") { 10 } %>
    pragmas:
      journal_mode: wal
      synchronous: normal
      mmap_size: 134217728
      cache_size: 10000
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
    pragmas:
      journal_mode: wal
    pool: <%= ENV.fetch("SOLID_QUEUE_POOL") { 10 } %>
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
    pragmas:
      journal_mode: wal
    pool: <%= ENV.fetch("SOLID_CACHE_POOL") { 5 } %>
